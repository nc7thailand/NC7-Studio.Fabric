<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoamArt Fabric Spike — Custom Controls</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Fabric v7 spike</h1>
      <p>Custom controls demo — clone &amp; delete on bbox (sibling repo, not Studio)</p>
    </header>
    <main>
      <div id="toolbar">
        <button type="button" id="add-rect">Add rectangle</button>
        <span class="hint">Select object · green = clone · red = delete · drag handles to resize</span>
      </div>
      <div id="canvas-wrap">
        <canvas id="fabric-canvas"></canvas>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
